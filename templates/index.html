<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWS Weather App</title>
    <style>
        :root { --primary: #6c5ce7; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #a8c0ff, #3f2b96); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 2rem; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); width: 350px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.3); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 1rem; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #5b4bc4; }
        .weather-icon { width: 100px; height: 100px; margin: 1rem 0; border-radius: 50%; border: 3px solid white; }
        .temp { font-size: 3rem; font-weight: bold; margin: 0; }
        .details { font-size: 0.9rem; opacity: 0.9; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <form method="POST">
            <input type="text" name="city" placeholder="City, State (e.g. Austin, TX)" required>
            <button type="submit">Check Weather</button>
        </form>

        {% if weather %}
        <div class="result">
            <h2>{{ city.split(',')[0].title() }}</h2>
            <img src="{{ weather.icon }}" alt="weather icon" class="weather-icon">
            <p class="temp">{{ weather.temp }}°{{ weather.unit }}</p>
            <p style="text-transform: uppercase; letter-spacing: 1px;">{{ weather.desc }}</p>
            <div class="details">
                <p><strong>Wind:</strong> {{ weather.wind }}</p>
                <p>{{ weather.detailed }}</p>
            </div>
        </div>
        {% elif city %}
        <p>Location not found. Try "City, State".</p>
        {% endif %}
    </div>
</body>
</html>
