<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Weather App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Weather Finder</h2>
        <form method="POST">
            <input type="text" name="city" placeholder="Enter city name..." required>
            <button type="submit">Get Weather</button>
        </form>

        {% if weather %}
        <div class="result">
            <h3>{{ city.title() }}</h3>
            <p><strong>Temp:</strong> {{ weather.temp }}°C</p>
            <p><strong>Condition:</strong> {{ weather.desc }}</p>
            <p><strong>Feels Like:</strong> {{ weather.feels_like }}°C</p>
            <p><strong>Humidity:</strong> {{ weather.humidity }}%</p>
            <p><strong>Wind:</strong> {{ weather.wind }} km/h</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
